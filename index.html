<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LootGround</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="text-zinc-200 transition-colors duration-300 min-h-screen flex flex-col">

<img 
    src="css/images/steve.png" 
    alt="Steve Background" 
    class="minecraft-steve-bg"
  >
<div class="bg-watermark">ROZENTY</div>

<svg id="connection-layer"
     width="100%"
     height="100%"
     style="position:absolute; top:0; left:0; pointer-events:none; z-index:9999;">

  <defs>

    <linearGradient id="appleGradient" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c026d3"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

</svg>

<header id="header"></header>

<div class="max-w-7xl mx-auto px-6 pt-28 pb-20 flex-grow w-full">
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">

    <aside class="lg:col-span-3">
      <div id="sidebar"></div>
    </aside>

    <main class="lg:col-span-9" id="main-content">
    </main>

  </div>
</div>

<footer id="footer" class="site-footer"></footer>

<script src="js/script.js"></script>
</body>
